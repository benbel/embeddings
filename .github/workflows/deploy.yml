name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site/outputs
          cp index.html _site/
          cp outputs/cluster_both.svg _site/outputs/
          cp outputs/cluster_chat.svg _site/outputs/
          cp outputs/cluster_chien.svg _site/outputs/
          cp outputs/cooccurrence_matrix.svg _site/outputs/
          cp outputs/corpus_analogy_scatter.svg _site/outputs/
          cp outputs/corpus_pca_scatter.svg _site/outputs/
          cp outputs/corpus_train_animation.svg _site/outputs/
          cp outputs/dot_similarity.svg _site/outputs/
          cp outputs/embedding_train_animation.svg _site/outputs/
          cp outputs/vector_example.svg _site/outputs/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
